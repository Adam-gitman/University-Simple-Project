<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/styles/list.css">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div class="sec_table">
        <div class="table-container">
            <table class="custom-table">

                </thead>
                <tbody>
                    <!-- Fila 1 -->
                    <tr>
                        <td>1</td>
                        <td>
                            <div class="user-info">
                                <img src="https://i.pravatar.cc/150?u=kathryn" alt="avatar">
                                <span>Kathryn Murphy</span>
                            </div>
                        </td>
                        <td>14</td>
                        <td>4.8</td>
                        <td><span class="badge badge-essential">Aprobado</span></td>
                        <td>
                            <div class="action-buttons">
                                <a href="#" class="action-btn btn-edit"><i class="bx bx-edit-alt"></i></a>
                                <a href="#" class="action-btn btn-delete"><i class="bx bx-trash-alt"></i></a>
                            </div>
                        </td>
                    </tr>
                    <!-- Fila 2 -->
                    <tr>
                        <td>2</td>

                                <img src="https://i.pravatar.cc/150?u=savannah" alt="avatar">

                        <td>15</td>
                        <td>4.5</td>
                        <td><span class="badge badge-essential">Aprobado</span></td>
                        <td>

                            </div>

                    </tr>
                    <!-- Fila 6 (Ejemplo de color rojo) -->
                    <tr>
                        <td>6</td>
                        <td>
                            <div class="user-info">
                                <img src="https://i.pravatar.cc/150?u=devon" alt="avatar">
                                <span>Devon Lane</span>
                            </div>

                        <td>16</td>
                        <td>3.8</td>

                        <td>8</td>

                            <div class="user-info">

                            </div>
                        </td>
                        <td>15</td>
                        <td>2.6</td>
                        <td><span class="badge badge-extraordinary">Reprobado</span></td>

    <script src="/static/js/index.js"></script>
